---
# Build the ESPHome binary firmware and deploy it to GitHub Pages.
name: Publish firmware

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.files-array.outputs.files }}
    steps:
      - id: files-array
        run: |
          files=$(echo "osmobuddy.yaml" | jq -Rcn 'inputs | . / ","')
          echo "files=$files" >> "$GITHUB_OUTPUT"

  build:
    name: Build ESPHome binary for ${{ matrix.file }}
    needs: [prepare]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        file: ${{ fromJson(needs.prepare.outputs.files) }}
    outputs:
      esphome-version: ${{ steps.esphome-build.outputs.esphome-version }}
    steps:
      - uses: actions/checkout@v4
      - run: |
          GIT_VERSION=$(git describe --tags --always --dirty)
          sed -i "s/GIT_VERSION_FIELD/$GIT_VERSION/g" ${{ matrix.file }}
      - uses: esphome/build-action@v5
        id: esphome-build
        with:
          yaml_file: ${{ matrix.file }}
      - run: |
          mkdir output
          mv "${{ steps.esphome-build.outputs.name }}" output/
      - uses: actions/upload-artifact@v4
        with:
          name: osmobuddy
          path: output

  publish:
    name: Publish new firmware and website to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: output
          name: osmobuddy

      - name: Create single manifest.json
        run: |
          jq -s '{"name": "osmobuddy", "version": "${{ needs.build.outputs.esphome-version }}", "home_assistant_domain": "esphome", "new_install_skip_erase": false, "builds":.}' output/*/manifest.json > output/manifest.json

      - run: |
          GIT_VERSION=$(git describe --tags --always --dirty)
          sed -i "s/GIT_VERSION/$GIT_VERSION/g" static/index.html
      - run: cp -R static/* output

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: output
          clean: true
